<div class="canvas-block">
    <div class="canvas-header">
        <h3 class="canvas-title" (click)="selectCanvas()">Canvas</h3>
        <div class="canvas-actions">
            <button class="secondary-btn" (click)="canvasImportInput.click()">Import JSON</button>
            <input #canvasImportInput type="file" accept="application/json,.json" hidden (change)="onCanvasImportChange($event)">
            <button class="secondary-btn" (click)="importCanvasFromText()">Paste JSON</button>
            <button class="export-btn" (click)="exportCanvasJson()">Export JSON</button>
            <button class="export-btn" (click)="exportToPdf()" [disabled]="cards.length === 0">Export to PDF</button>
        </div>
    </div>

    <!-- Canvas tabs -->
    <div class="canvas-tabs">
        <div
            *ngFor="let cv of canvases"
            class="canvas-tab"
            [class.active]="cv.id === canvas.id"
            (click)="switchCanvas(cv)"
        >
            <span class="tab-name">{{ cv.name }}</span>
            <button
                class="tab-btn"
                (click)="renameCanvas(cv.id); $event.stopPropagation()"
                title="Rename"
            >✎</button>
            <button
                class="tab-btn delete"
                (click)="deleteCanvas(cv.id); $event.stopPropagation()"
                title="Delete"
                [disabled]="canvases.length === 1"
            >✕</button>
        </div>
        <button class="add-canvas-btn" (click)="addNewCanvas()" title="Add new canvas">+</button>
    </div>

    <!-- Pages wrapper: scrolls vertically to show all pages -->
    <div class="canvas-pages-container">
        <!-- Each page is a canvas-container with fixed canvas dimensions -->
        <div
            *ngFor="let page of cardPages; let pageIndex = index; trackBy: trackByPageIndex"
            class="canvas-container"
            [style.width.px]="canvas.canvasWidth"
            [style.height.px]="canvas.canvasHeight"
        >
            <div
                class="canvas-inner"
                [style.width.px]="canvas.canvasWidth"
                [style.height.px]="canvas.canvasHeight"
                [style.padding.px]="canvas.distanceFromBorders"
                [style.display]="'grid'"
                [style.gridTemplateColumns]="'repeat(' + cardsPerRowNum + ', ' + canvas.cardWidth + 'px)'"
                [style.gridAutoRows]="canvas.cardHeight + 'px'"
                [style.columnGap.px]="canvas.distanceBetweenCards"
                [style.rowGap.px]="canvas.distanceBetweenCards"
                [style.gap.px]="canvas.distanceBetweenCards"
            >
                <div
                    *ngFor="let card of page; trackBy: trackByCardId"
                    class="canvas-card"
                    [class.selected]="isSelected(card)"
                    [style.width.px]="canvas.cardWidth"
                    [style.height.px]="canvas.cardHeight"
                    (click)="onCardClick(card, $event)"
                >
                    <div class="card-inner" [innerHTML]="getSafeHtml(card)"></div>
                </div>
            </div>
        </div>
    </div>

    <div *ngIf="isEditingTemplate" class="modal-overlay" (click)="closeModal($event)">
        <div
                class="modal-card"
                (click)="$event.stopPropagation()"
                [style.width.px]="canvas.cardWidth"
                [style.height.px]="canvas.cardHeight"
                [innerHTML]="getPreviewSafeHtml()"
        ></div>
    </div>

    <app-json-modal
            [visible]="showJsonModal"
            [title]="jsonModalTitle"
            [content]="jsonModalContent"
            (close)="closeJsonModal()"
    ></app-json-modal>
</div>
