<div class="templates-block">
    <h3>Templates</h3>
    <div class="actions-row">
        <button class="small-btn" (click)="newTemplate()">New template</button>
        <button class="small-btn" (click)="templateImportInput.click()">Import</button>
        <input #templateImportInput type="file" accept="application/json,.json" (change)="onTemplateImportChange($event)" hidden>
        <button class="small-btn" (click)="importTemplateFromText()">Paste JSON</button>
    </div>
    <div *ngFor="let template of getTemplatesForCanvas()" class="tree-node">
        <div class="tree-header">
            <button class="toggle-btn" (click)="toggleExpand(template.id)">
                {{ isExpanded(template.id) ? '-' : '+' }}
            </button>
            <strong class="clickable" (click)="editTemplate(template)">{{ template.name || 'undefined' }}</strong>
            <button class="small-btn" (click)="loadTemplate(template)">Add card</button>
            <button class="small-btn" (click)="exportTemplate(template)">Export</button>
            <button class="small-btn" (click)="duplicateTemplate(template)">Duplicate</button>
            <button class="small-btn" (click)="deleteTemplate(template)">Delete</button>
        </div>
        <div *ngIf="isExpanded(template.id)" class="tree-children">
            <ng-container *ngFor="let card of getLinkedCards(template.id); let i = index">
                <div *ngIf="i > 0" class="cards-separator"></div>
                <div class="tree-node child-node card-row" [class.active-card]="isActiveCard(card)">
                <strong class="clickable" (click)="onCardClick(card, $event)">{{ card.name || 'undefined' }}</strong>
                <button class="small-btn" (click)="exportCard(card)">Export card</button>
                <button class="small-btn" (click)="duplicateCard(card)">Duplicate</button>
                <button class="small-btn" (click)="removeCard(card)">Remove</button>
                </div>
            </ng-container>
            <div *ngIf="getLinkedCards(template.id).length === 0" class="no-children">
                No linked cards
            </div>
        </div>
    </div>
    <ng-container *ngIf="getUnlinkedCards().length > 0">
        <h3>Unlinked Cards</h3>
        <div *ngFor="let card of getUnlinkedCards()" class="card-row" [class.active-card]="isActiveCard(card)">
            <strong class="clickable" (click)="onCardClick(card, $event)">{{ card.name || 'undefined' }}</strong>
            <button class="small-btn" (click)="exportCard(card)">Export card</button>
            <button class="small-btn" (click)="duplicateCard(card)">Duplicate</button>
            <button class="small-btn" (click)="removeCard(card)">Remove</button>
            <button class="small-btn" (click)="saveCardAsTemplate(card)">Save as Template</button>
        </div>
    </ng-container>
    <app-json-modal
        [visible]="showJsonModal"
        [title]="jsonModalTitle"
        [content]="jsonModalContent"
        (close)="closeJsonModal()"
    ></app-json-modal>
</div>
