<div class="properties-block">
    <h3>Properties</h3>

    <label>Card Name:</label>
    <input [(ngModel)]="cardName" placeholder="Card name" />

    <label>HTML Content:</label>
    <textarea [(ngModel)]="htmlText" (input)="onHtmlChange()" rows="6"></textarea>

    <button (click)="saveCard()">Save Card</button>
</div>
