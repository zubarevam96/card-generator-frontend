<div class="template-properties">
    <h3>Template Properties</h3>

    <label>Template Name:</label>
    <input [(ngModel)]="templateName" (input)="onNameChange()" placeholder="Template name" />

    <ng-container *ngIf="selectedTemplate">
        <label>Template HTML:</label>
        <div id="code-editor" class="code-editor"></div>
        <div class="button-group">
            <button (click)="saveAsNewTemplate()">Save as New Template</button>
            <button (click)="duplicateTemplate()">Duplicate Template</button>
        </div>
    </ng-container>

    <div *ngIf="!selectedTemplate" class="no-selection">
        Select a template to edit its HTML
    </div>
</div>
