<div class="canvas-properties">
    <h4>Canvas Properties (PDF Dimensions)</h4>

    <div class="property-group">
        <label>
            Canvas Width (pixels):
            <input type="number" [(ngModel)]="canvas.canvasWidth" (input)="updateCanvas()" placeholder="PDF width in pixels" />
            <span class="hint">{{ (canvas.canvasWidth * 0.264583).toFixed(1) }}mm</span>
        </label>
    </div>

    <div class="property-group">
        <label>
            Canvas Height (pixels):
            <input type="number" [(ngModel)]="canvas.canvasHeight" (input)="updateCanvas()" placeholder="PDF height in pixels" />
            <span class="hint">{{ (canvas.canvasHeight * 0.264583).toFixed(1) }}mm</span>
        </label>
    </div>

    <div class="presets">
        <h5>Paper Size Presets</h5>
        <button (click)="setA4Portrait()" title="210x297mm — {{a4PortraitWidth}}x{{a4PortraitHeight}}px">A4 Portrait</button>
        <button (click)="setA4Landscape()" title="297x210mm — {{a4LandscapeWidth}}x{{a4LandscapeHeight}}px">A4 Landscape</button>
    </div>

    <hr>

    <h4>Card Properties</h4>

    <div class="property-group">
        <label>
            Card Width:
            <input type="number" [(ngModel)]="canvas.cardWidth" (input)="updateCanvas()" />
        </label>
    </div>

    <div class="property-group">
        <label>
            Card Height:
            <input type="number" [(ngModel)]="canvas.cardHeight" (input)="updateCanvas()" />
        </label>
    </div>

    <div class="property-group">
        <label>
            Distance between cards:
            <input type="number" [(ngModel)]="canvas.distanceBetweenCards" (input)="updateCanvas()" />
        </label>
    </div>

    <div class="property-group">
        <label>
            Distance from borders (px):
            <input type="number" [(ngModel)]="canvas.distanceFromBorders" (input)="updateCanvas()" />
        </label>
    </div>

    <div class="presets card-presets">
        <h5>Card Size Presets</h5>
        <div class="preset-row">
            <button
                (click)="setEurogameSmall()"
                title="41×63mm — {{smallCardWidth}}x{{smallCardHeight}}px"
            >
                Small
            </button>
            <button
                (click)="setEurogameMedium()"
                title="45×68mm — {{mediumCardWidth}}x{{mediumCardHeight}}px"
            >
                Medium
            </button>
            <button
                (click)="setEurogameLarge()"
                title="59×92mm — {{largeCardWidth}}x{{largeCardHeight}}px"
            >
                Large
            </button>
            <button
                (click)="setMtgStandard()"
                title="63×88mm — {{mtgCardWidth}}x{{mtgCardHeight}}px"
            >
                MTG Standard
            </button>
        </div>
    </div>
</div>
