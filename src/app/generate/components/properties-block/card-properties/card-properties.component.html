<div class="card-properties">
    <h3>Card Properties</h3>

    <label>Card Name:</label>
    <input [(ngModel)]="cardName" placeholder="Card name" />

    <label>HTML Content:</label>
    <textarea
            [(ngModel)]="htmlText"
            (input)="onHtmlChange()"
            rows="8"
            placeholder="Enter HTML code..."
            [disabled]="isLocked"
    ></textarea>
    <p *ngIf="isLocked">This card is based on a template and cannot be edited.</p>

    <button (click)="saveNewCard()">Save New Card</button>
</div>
