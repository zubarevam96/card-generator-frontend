<div class="card-properties">
    <h3>Card Properties</h3>

    <ng-container *ngIf="variableKeys.length > 0; else noCard">
        <label>Card Name:</label>
        <input [(ngModel)]="cardName" (input)="onNameChange()" placeholder="Card name" />

        <label>Card Variables:</label>
        <div *ngFor="let key of variableKeys" class="variable-input">
            <label>{{ key }}:</label>
            <textarea 
                [(ngModel)]="localVariables[key]" 
                (input)="onVariableChange(key)" 
                placeholder="Enter value..."
                rows="3"
            ></textarea>
            <label class="sub-label">Font size (px, optional):</label>
            <input
                type="number"
                min="6"
                max="72"
                step="1"
                class="font-size-input"
                [ngModel]="localFontSizes[key]"
                (ngModelChange)="onFontSizeChange(key, $event)"
                placeholder="default"
            />
        </div>
        <button (click)="editTemplate()">Edit Template</button>
    </ng-container>

    <ng-template #noCard>
        <div class="no-selection">
            Select a card to edit its properties
        </div>
    </ng-template>
</div>
