<div class="copypasta-library">
    <div class="copypasta-header">
        <h3>Copypastas</h3>
        <div class="header-actions">
            <button type="button" (click)="showTextForm = !showTextForm" class="add-btn">
                {{ showTextForm ? 'Cancel' : '+ Text' }}
            </button>
            <button type="button" (click)="imageInput.click()" class="add-btn">+ Image</button>
            <input #imageInput type="file" accept="image/*" hidden (change)="onImageSelected($event)">
        </div>
    </div>

    <div class="form-section" *ngIf="showTextForm">
        <div class="form-group">
            <label>Snippet Name</label>
            <input type="text" [(ngModel)]="textForm.name" placeholder="e.g., Red Badge">
        </div>
        <div class="form-group">
            <label>HTML Content</label>
            <textarea [(ngModel)]="textForm.content" placeholder="e.g., &lt;div style=&quot;color:red&quot;&gt;Text&lt;/div&gt;" rows="4"></textarea>
        </div>
        <button type="button" (click)="addTextCopypasta()" class="save-btn">Save Text</button>
    </div>

    <div class="copypastas-list">
        <div class="list-section">
            <h4>Text Snippets</h4>
            <div class="copypasta-item" *ngFor="let cp of (textCopypastas$ | async)">
                <div class="text-copypasta">
                    <div class="copypasta-name">{{ cp.name }}</div>
                    <div class="copypasta-preview" [innerHTML]="cp.content"></div>
                    <div class="copypasta-reference">Reference: <code>{{ '{' }}cp_{{ cp.id }}_text{{ '}' }}</code></div>
                    <button type="button" (click)="deleteCopypasta(cp.id)" class="delete-btn">Delete</button>
                </div>
            </div>
            <div class="empty-state" *ngIf="!(hasTextCopypastas$ | async)">
                No text snippets yet
            </div>
        </div>

        <div class="list-section">
            <h4>Image Snippets</h4>
            <div class="copypasta-item" *ngFor="let cp of (imageCopypastas$ | async)">
                <div class="image-copypasta">
                    <div class="copypasta-name">{{ cp.name }}</div>
                    <div class="image-preview-wrapper">
                        <img [src]="cp.dataUrl" [alt]="cp.name" class="image-preview">
                    </div>
                    <div class="copypasta-reference">Reference: <code>{{ '{' }}cp_{{ cp.id }}_img{{ '}' }}</code></div>
                    <div class="size-control">
                        <label>Size:</label>
                        <input type="number" [value]="cp.defaultSize" (change)="updateImageSize(cp.id, +$event.target.value)" min="4" max="128">
                        <span>px</span>
                    </div>
                    <button type="button" (click)="deleteCopypasta(cp.id)" class="delete-btn">Delete</button>
                </div>
            </div>
            <div class="empty-state" *ngIf="!(hasImageCopypastas$ | async)">
                No image snippets yet
            </div>
        </div>
    </div>
</div>
